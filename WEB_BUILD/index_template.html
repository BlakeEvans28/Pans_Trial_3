import asyncio
import platform
import traceback
from pathlib import Path


async def custom_site():
    try:
        import embed

        platform.document.body.style.background = "#000000"
        platform.window.transfer.hidden = True
        platform.window.canvas.style.visibility = "visible"

        bundle = "__BUNDLE__"
        appdir = Path(f"/data/data/{bundle}")
        appdir.mkdir(parents=True, exist_ok=True)

        if platform.window.location.host.find(".itch.zone") > 0:
            import zipfile

            async with platform.fopen(f"{bundle}.apk", "rb") as archive:
                with zipfile.ZipFile(archive) as zip_ref:
                    zip_ref.extractall(appdir.as_posix())
        else:
            import tarfile

            async with platform.fopen(f"{bundle}.tar.gz", "rb") as archive:
                tar = tarfile.open(fileobj=archive, mode="r:gz")
                tar.extractall(path=appdir.as_posix(), filter="tar")
                tar.close()

        platform.run_main(PyConfig, loaderhome=appdir / "assets", loadermain=None)

        while embed.counter() < 0:
            await asyncio.sleep(0.1)

        main_path = appdir / "assets" / "main.py"

        if not platform.window.MM.UME:
            __import__(__name__).__file__ = main_path
            msg = "Ready to start. Please click or tap the page."
            platform.window.infobox.innerText = msg
            print("\n" * 4, f"    * Waiting for media user engagement. {msg} *", "\n" * 4)

            while not platform.window.MM.UME:
                await asyncio.sleep(0.1)

        await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)
        __import__(__name__).__file__ = main_path
        platform.window.panTrialReady = False
        platform.window.panTrialError = ""
        platform.window.panTrialStatus = "Starting Pan's Trial..."

        def ui_callback(pkg):
            platform.window.infobox.innerText = f"installing {pkg}"

        try:
            await shell.source(main_path, callback=ui_callback)
        except Exception as exc:
            error_text = f"Launch failed: {exc.__class__.__name__}: {exc}"
            platform.window.infobox.style.display = "block"
            platform.window.infobox.innerText = error_text
            traceback.print_exc()
            try:
                platform.console.error(traceback.format_exc())
            except Exception:
                pass
            raise

        if not platform.window.panTrialStatus or platform.window.panTrialStatus == "Starting Pan's Trial...":
            platform.window.panTrialStatus = "Pan's Trial script loaded. Waiting for first frame..."

        platform.window.infobox.style.display = "block"
        while not platform.window.panTrialReady:
            if platform.window.panTrialError:
                raise RuntimeError(platform.window.panTrialError)
            if platform.window.panTrialStatus:
                platform.window.infobox.innerText = platform.window.panTrialStatus
            await asyncio.sleep(0.05)

        platform.window.infobox.style.display = "none"
        platform.window.config.gui_divider = 1
        platform.window.window_resize()
        print("default.tmpl: done")

        shell.interactive()
    except Exception:
        error_text = traceback.format_exc()
        platform.window.infobox.style.display = "block"
        platform.window.infobox.style.whiteSpace = "pre-wrap"
        platform.window.infobox.style.maxWidth = "80vw"
        platform.window.infobox.style.maxHeight = "70vh"
        platform.window.infobox.style.overflow = "auto"
        platform.window.infobox.style.textAlign = "left"
        platform.window.infobox.innerText = error_text
        try:
            platform.console.error(traceback.format_exc())
        except Exception:
            pass
        raise


asyncio.run(custom_site())

    --><script>
      window.panTrialAudio = {
          currentMusic: null,
          musicVolume: 0.275,
          oneShotVolume: 0.5,
          _getMusic: function(src) {
              if (!this._musicCache) {
                  this._musicCache = {};
              }
              if (!this._musicCache[src]) {
                  var audio = new Audio(src);
                  audio.preload = "auto";
                  audio.loop = true;
                  audio.volume = this.musicVolume;
                  this._musicCache[src] = audio;
              }
              return this._musicCache[src];
          },
          setVolume: function(volume) {
              var clamped = Math.max(0, Math.min(1, Number(volume) || 0));
              this.oneShotVolume = clamped;
              this.musicVolume = clamped * 0.55;
              if (this.currentMusic) {
                  this.currentMusic.volume = this.musicVolume;
              }
          },
          playMusic: function(src, volume) {
              if (!src) { return false; }
              this.setVolume(volume);
              var next = this._getMusic(src);
              if (this.currentMusic && this.currentMusic !== next) {
                  this.currentMusic.pause();
                  this.currentMusic.currentTime = 0;
              }
              this.currentMusic = next;
              next.volume = this.musicVolume;
              var promise = next.play();
              if (promise && promise.catch) {
                  promise.catch(function(error) {
                      console.warn("Pan's Trial music playback failed", error);
                  });
              }
              return true;
          },
          stopMusic: function() {
              if (!this.currentMusic) { return; }
              this.currentMusic.pause();
              this.currentMusic.currentTime = 0;
              this.currentMusic = null;
          },
          playOneShot: function(src, volume) {
              if (!src) { return false; }
              this.setVolume(volume);
              var audio = new Audio(src);
              audio.preload = "auto";
              audio.volume = this.oneShotVolume;
              var promise = audio.play();
              if (promise && promise.catch) {
                  promise.catch(function(error) {
                      console.warn("Pan's Trial sound playback failed", error);
                  });
              }
              return true;
          }
      };
    </script><!--

    globalThis.__canvas_resized = (self, ecw, ech) => {

    function logViewport(tag) {}

    function get_canvas_layout() {
        var viewportWidth = window.innerWidth || document.documentElement.clientWidth || __WIDTH__;
        var viewportHeight = window.innerHeight || document.documentElement.clientHeight || __HEIGHT__;
        var scale = Math.min(viewportWidth / __WIDTH__, viewportHeight / __HEIGHT__);
        var width = Math.max(1, Math.round(__WIDTH__ * scale));
        var height = Math.max(1, Math.round(__HEIGHT__ * scale));
        return {
            width: width,
            height: height
        };
    }

    function apply_canvas_layout(canvas, realSet) {
        if (!canvas) { return; }
        var setStyle = realSet || canvas.style.setProperty.bind(canvas.style);
        var layout = get_canvas_layout();
        canvas.__ourWrite = true;
        setStyle("width", layout.width + "px", "important");
        canvas.__ourWrite = true;
        setStyle("height", layout.height + "px", "important");
        canvas.__ourWrite = true;
        setStyle("left", "0px", "important");
        canvas.__ourWrite = true;
        setStyle("top", "0px", "important");
        canvas.__ourWrite = true;
        setStyle("right", "0px", "important");
        canvas.__ourWrite = true;
        setStyle("bottom", "0px", "important");
        canvas.__ourWrite = true;
        setStyle("margin", "auto", "important");
    }

    (function installEnforcer() {
        var canvas = document.getElementById("canvas");
        if (!canvas) { setTimeout(installEnforcer, 50); return; }

        var realSet = canvas.style.setProperty.bind(canvas.style);

        canvas.style.setProperty = function(prop, val, prio) {
            canvas.__ourWrite = true;
            return realSet(prop, val, prio);
        };

        function enforce() {
            apply_canvas_layout(canvas, realSet);
        }

        var observer = new MutationObserver(function() {
            if (canvas.__ourWrite) { canvas.__ourWrite = false; return; }
            enforce();
        });
        observer.observe(canvas, { attributes: true, attributeFilter: ["style"] });
        enforce();
    })();

    function force_canvas_size() {
        if (typeof config !== "undefined") {
            config.fb_width = "__WIDTH__";
            config.fb_height = "__HEIGHT__";
            config.fb_ar = __ASPECT__;
            config.gui_divider = 1;
        }
        var canvas3d = document.getElementById("canvas3d");
        if (canvas3d) {
            canvas3d.width = __WIDTH__;
            canvas3d.height = __HEIGHT__;
        }
        if (typeof window_resize === "function") {
            try { window_resize(); } catch (error) {}
        }
        var canvas = document.getElementById("canvas");
        apply_canvas_layout(canvas);
    }

    function settle_and_resize() {
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                force_canvas_size();
                setTimeout(force_canvas_size, 250);
                setTimeout(force_canvas_size, 800);
                setTimeout(force_canvas_size, 1600);
            });
        });
    }

    window.addEventListener("DOMContentLoaded", function() {
        force_canvas_size();
    });
    window.addEventListener("load", function() {
        settle_and_resize();
    });
    window.addEventListener("resize", function() {
        force_canvas_size();
    });
    window.addEventListener("orientationchange", function() {
        settle_and_resize();
    });
    if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", function() {
            force_canvas_size();
        });
    }

    async function custom_onload(debug_hidden) {
        console.log(__FILE__, "custom_onload");
        force_canvas_size();
        setTimeout(force_canvas_size, 100);
        setTimeout(force_canvas_size, 600);

        pyconsole.hidden = debug_hidden
        system.hidden = debug_hidden
        transfer.hidden = debug_hidden
        info.hidden = debug_hidden
        box.hidden = debug_hidden

        show_infobox()
    }

    function debug() {
        python.config.debug = true

    function info_inline(data) {
        document.getElementById("info").innerHTML = data
    }

    function info_online(url) {
        fetch(url)
            .then((response) => response.text())
            .then((html) => { info_inline(html); })
            .catch((error) => { console.warn(error); });
    }

    function frame_online(url) {

    }
